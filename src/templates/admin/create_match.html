{% extends "base.html" %}
{% block title %}Crear Partido - {{ tournament.name }}{% endblock %}
{% block body %}
{% include 'partials/navbar.html' %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4><i class="fas fa-futbol"></i> Nuevo partido para: {{ tournament.name }}</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        <div class="mb-3">
                            <label class="form-label">Equipo local</label>
                            <input type="text" name="equipo_local" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Equipo visitante</label>
                            <input type="text" name="equipo_visitante" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Fecha y hora</label>
                            <input type="datetime-local" name="fecha" class="form-control" required>
                        </div>
                        <div class="d-flex justify-content-between">
                            <button type="submit" class="btn btn-primary">Crear partido</button>
                            <a href="{{ url_for('admin.admin_tournament_matches', id=tournament.id) }}" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
