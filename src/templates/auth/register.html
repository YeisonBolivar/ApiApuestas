{% extends "base.html" %}
{% block title %}Registro{% endblock %}
{% block body %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-success text-white text-center rounded-top-4">
                    <h3><i class="fas fa-user-plus"></i> Registro</h3>
                </div>
                <div class="card-body p-4">
                    <form action="{{ url_for('auth.register') }}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Nombre de usuario</label>
                            <input type="text" name="username" class="form-control" placeholder="Elige un nombre" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" id="password" name="password" class="form-control" placeholder="Mínimo 4 caracteres" required>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" id="showPassword" class="form-check-input" onclick="togglePassword()">
                            <label class="form-check-label">Mostrar contraseña</label>
                        </div>
                        <button type="submit" class="btn btn-success w-100">
                            <i class="fas fa-check-circle"></i> Registrarse
                        </button>
                    </form>
                    <hr>
                    <p class="text-center mb-0">¿Ya tienes cuenta? <a href="{{ url_for('auth.login') }}">Inicia sesión</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
function togglePassword() {
    const pwd = document.getElementById("password");
    pwd.type = pwd.type === "password" ? "text" : "password";
}
</script>
{% endblock %}
